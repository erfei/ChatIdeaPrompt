<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChatGPTIdeaPrompt</title>
    <!--引入Bootstrap样式-->
    <link rel="stylesheet" href="../lib/bootstrap-icons/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../lib/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/askidea.css">
</head>
<body> 
    <div class="container-fluid">
        <div class="row mt-3">
          
        <!-- 保存快捷 -->
                <div class="modal fade" id="promptsave" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
                  <div class="modal-dialog" style="max-width:650px;">
                    <div class="modal-content">
                      <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel" data-i18n="title_Fast"></h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                      </div>
                      <div class="modal-body">
                        <div class="mb-3">
                           <input type="hidden" id="id" name="id"  value="">
                          <select class="form-select" id="fastmenuSelect1">

                          </select>
                        </div>
                        <div class="mb-3">
                         
                          <textarea class="form-control" id="promptTextarea1" rows="10"></textarea>
                        </div>
                        
                      </div>
                      <div class="modal-footer">
                        <button type="button" id="savefast" class="btn btn-primary" data-i18n="btn_save" ></button>
                      </div>
                    </div>
                  </div>
                </div>
            <div class="col-12 row askcon">
                <div class="container">
                    <h6 class="my-4"> <span data-i18n="fast_title"></span>  
                        <!-- <button  class="border-0 bg-transparent btntight">Public Prompt</button> -->
                        <button id="addBtn" data-bs-toggle="modal" data-bs-target="#promptsave" class="border-0 bg-transparent btntight"><i class="bi bi-plus"></i><span data-i18n="btn_add"></span></button>
                        
                        
                        
                        <!-- <button class="border-0 bg-transparent"><i class="bi bi-plus"></i>Model</button> -->
                    </h6>
                    <div class="alert alert-light" data-i18n="fast_msg"  role="alert">
                  
                    </div>
                    <ul id="list" class="list-group">
                
                   
                    </ul>
                   
                  </div>
            </div>
        </div>
    </div>
    <!--引入Bootstrap JS-->
    <script src="../lib/jquery/dist/jquery.min.js"></script>
    <script src="../lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/datatabe.js" type="text/javascript" charset="utf-8"></script>
    <script src="../js/localization.js" type="text/javascript" charset="utf-8"></script>
    <script src="../js/fast.js" type="text/javascript" charset="utf-8"></script>
</body>
</html>
